status = "supported"
summary = "Configure MCP servers in JSON under the servers key."
transports = ["stdio", "http", "sse"]
auth = ["headers"]
notes = ["Servers live under the servers key (not mcpServers)."]

[[files]]
path = "<VS Code User>/mcp.json"
scope = "global"
format = "json"
key = "servers"
note = "e.g. ~/Library/Application Support/Code/User/mcp.json on macOS."

[[files]]
path = ".vscode/mcp.json"
scope = "project"
format = "json"
key = "servers"

[[fields]]
name = "type"
type = "\"http\" | \"sse\""
description = "Remote transport type."

[[fields]]
name = "command"
type = "string"
description = "Command to start a local (stdio) server."

[[fields]]
name = "args"
type = "string[]"
description = "Arguments passed to the command."

[[fields]]
name = "env"
type = "record<string, string>"
description = "Environment variables for the server."

[[fields]]
name = "url"
type = "string"
description = "Endpoint URL for a remote server."

[[fields]]
name = "headers"
type = "record<string, string>"
description = "HTTP headers for a remote server."
