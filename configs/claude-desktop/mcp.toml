status = "supported"
summary = "Local (stdio) MCP servers in JSON under the mcpServers key."
transports = ["stdio"]
notes = ["Only local (stdio) servers are configured via the file. Add remote servers through Settings → Connectors in the app."]

[[files]]
path = "~/Library/Application Support/Claude/claude_desktop_config.json"
scope = "global"
format = "json"
key = "mcpServers"
note = "macOS path; see Claude Desktop docs for other operating systems."

[[fields]]
name = "command"
type = "string"
description = "Command to start a local (stdio) server."

[[fields]]
name = "args"
type = "string[]"
description = "Arguments passed to the command."

[[fields]]
name = "env"
type = "record<string, string>"
description = "Environment variables for the server."
