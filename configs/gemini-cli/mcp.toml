status = "supported"
summary = "Configure MCP servers in JSON under the mcpServers key."
transports = ["stdio", "http", "sse"]
auth = ["headers", "oauth"]

[[files]]
path = "~/.gemini/settings.json"
scope = "global"
format = "json"
key = "mcpServers"

[[files]]
path = ".gemini/settings.json"
scope = "project"
format = "json"
key = "mcpServers"

[[fields]]
name = "command"
type = "string"
description = "Command to start a local (stdio) server."

[[fields]]
name = "args"
type = "string[]"
description = "Arguments passed to the command."

[[fields]]
name = "env"
type = "record<string, string>"
description = "Environment variables for the server."

[[fields]]
name = "url"
type = "string"
description = "Endpoint URL for a remote server."

[[fields]]
name = "headers"
type = "record<string, string>"
description = "HTTP headers for a remote server."

[[fields]]
name = "timeout"
type = "number"
description = "Request timeout in milliseconds for remote servers."

[[fields]]
name = "oauth"
type = "{ scopes: string[] }"
description = "OAuth configuration (scopes written under oauth.scopes)."
